<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Schéma d'architecture front back</title>
  <desc id="desc">Schéma type Lucidchart montrant les briques frontend, backend et les interactions API.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#475467"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .front { fill: #fff7ed; stroke: #fdba74; stroke-width: 2; rx: 18; }
      .back { fill: #eff6ff; stroke: #93c5fd; stroke-width: 2; rx: 18; }
      .data { fill: #f5f3ff; stroke: #c4b5fd; stroke-width: 2; rx: 18; }
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .section { font: 700 24px Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 18px Arial, sans-serif; fill: #111827; }
      .small { font: 500 15px Arial, sans-serif; fill: #475467; }
      .tag { font: 700 13px Arial, sans-serif; fill: #ffffff; }
      .proto { font: 700 14px 'Courier New', monospace; fill: #334155; }
      .boxtext { font: 600 16px Arial, sans-serif; fill: #1f2937; }
      .muted { font: 600 13px Arial, sans-serif; fill: #64748b; letter-spacing: 1px; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="900"/>
  <text x="70" y="90" class="title">Schéma d'architecture Front / Back</text>


  <rect x="70" y="170" width="220" height="90" class="card"/>
  <text x="105" y="210" class="label">Utilisateur</text>
  <text x="105" y="236" class="small">Navigateur Web</text>

  <rect x="360" y="150" width="470" height="610" class="front"/>
  <text x="395" y="195" class="section">Frontend Angular</text>
  <rect x="655" y="170" width="130" height="30" rx="15" fill="#f97316"/>
  <text x="696" y="190" class="tag">ANGULAR</text>

  <rect x="400" y="230" width="390" height="90" class="card"/>
  <text x="430" y="267" class="label">Pages</text>
  <text x="430" y="294" class="boxtext">Accueil • Login • Register • Upload • Download</text>

  <rect x="400" y="345" width="390" height="102" class="card"/>
  <text x="430" y="382" class="label">Composants UI</text>
  <text x="430" y="409" class="boxtext">Formulaires • Historique • Cartes fichiers</text>
  <text x="430" y="432" class="boxtext">Messages</text>

  <rect x="400" y="460" width="390" height="90" class="card"/>
  <text x="430" y="497" class="label">Services</text>
  <text x="430" y="524" class="boxtext">AuthService • FileService</text>

  <rect x="400" y="575" width="390" height="132" class="card"/>
  <text x="430" y="612" class="label">Sécurité front</text>
  <text x="430" y="639" class="boxtext">AuthGuard • TokenInterceptor</text>
  <text x="430" y="662" class="boxtext">ErrorInterceptor</text>
  <text x="430" y="688" class="small">JWT • erreurs HTTP • routes protégées</text>

  <rect x="900" y="150" width="400" height="610" class="back"/>
  <text x="935" y="195" class="section">Backend Spring Boot</text>
  <rect x="1190" y="170" width="100" height="30" rx="15" fill="#2563eb"/>
  <text x="1193" y="190" class="tag">SPRING BOOT</text>

  <rect x="940" y="230" width="320" height="102" class="card"/>
  <text x="970" y="267" class="label">Controllers</text>
  <text x="970" y="294" class="boxtext">AuthController • UploadController</text>
  <text x="970" y="317" class="boxtext">UserController</text>

  <rect x="940" y="345" width="320" height="90" class="card"/>
  <text x="970" y="382" class="label">Services</text>
  <text x="970" y="409" class="boxtext">AuthService • UploadService</text>

  <rect x="940" y="460" width="320" height="102" class="card"/>
  <text x="970" y="497" class="label">Repositories</text>
  <text x="970" y="524" class="boxtext">UserRepository</text>
  <text x="970" y="547" class="boxtext">FileMetadataRepository</text>

  <rect x="940" y="575" width="320" height="132" class="card"/>
  <text x="970" y="612" class="label">Sécurité back</text>
  <text x="970" y="639" class="boxtext">Spring Security</text>
  <text x="970" y="662" class="boxtext">JwtAuthenticationFilter</text>
  <text x="970" y="688" class="small">JWT • BCrypt • validation • gestion erreurs</text>

  <rect x="1370" y="200" width="180" height="160" class="data"/>
  <text x="1405" y="245" class="label">PostgreSQL</text>
  <text x="1405" y="275" class="boxtext">users</text>
  <text x="1405" y="300" class="boxtext">file_metadata</text>
  <text x="1405" y="325" class="boxtext">file_tags</text>

  <rect x="1370" y="430" width="180" height="130" class="data"/>
  <text x="1405" y="475" class="label">Stockage</text>
  <text x="1405" y="505" class="boxtext">uploads/</text>
  <text x="1405" y="530" class="boxtext">fichiers</text>

  <rect x="1370" y="630" width="180" height="90" class="data"/>
  <text x="1405" y="675" class="label">Supervision</text>
  <text x="1405" y="702" class="boxtext">Actuator • Logs</text>

  <line x1="290" y1="215" x2="360" y2="215" stroke="#475467" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="308" y="200" class="proto">HTTP</text>

  <line x1="830" y1="455" x2="900" y2="455" stroke="#475467" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="900" y1="500" x2="830" y2="500" stroke="#475467" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="840" y="438" class="proto">REST / JSON</text>
  <text x="855" y="523" class="proto">JWT</text>

  <line x1="1260" y1="505" x2="1370" y2="280" stroke="#475467" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1260" y1="520" x2="1370" y2="495" stroke="#475467" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1260" y1="650" x2="1370" y2="675" stroke="#475467" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="1288" y="380" class="proto">JPA</text>
  <text x="1280" y="470" class="proto">I/O</text>

  <line x1="1100" y1="320" x2="1100" y2="345" stroke="#475467" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1100" y1="435" x2="1100" y2="460" stroke="#475467" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="70" y="800" width="1480" height="52" class="card"/>
  <text x="95" y="832" class="muted">AUTH • UPLOAD • DOWNLOAD • HISTORY • DELETE • JWT • API REST • POSTGRESQL • FILESYSTEM</text>
</svg>
