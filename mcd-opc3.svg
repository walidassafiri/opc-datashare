<svg xmlns="http://www.w3.org/2000/svg" width="2600" height="2600" viewBox="0 0 2600 2600">
  <defs>
    <style>
      .title { font: 700 38px 'Arial', sans-serif; fill: #0f172a; }
      .subtitle { font: 500 23px 'Arial', sans-serif; fill: #334155; }
      .section { font: 700 30px 'Arial', sans-serif; fill: #0f172a; }
      .box-title { font: 700 26px 'Arial', sans-serif; fill: #0f172a; }
      .text { font: 500 20px 'Arial', sans-serif; fill: #1e293b; }
      .small { font: 500 18px 'Arial', sans-serif; fill: #334155; }
      .line { stroke: #334155; stroke-width: 3; }
      .arrow { stroke: #334155; stroke-width: 3; marker-end: url(#arrow); fill: none; }
      .table { fill: #ffffff; stroke: #334155; stroke-width: 3; rx: 12; }
      .chip { fill: #eef2ff; stroke: #475569; stroke-width: 2; rx: 25; }
      .service { fill: #f8fafc; stroke: #334155; stroke-width: 3; rx: 22; }
      .db { fill: #ffffff; stroke: #334155; stroke-width: 3; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="2600" height="2600" fill="#f8fafc"/>
  <g transform="translate(450,90) scale(0.75)">

  <text x="900" y="80" text-anchor="middle" class="title">Documentation technique - Schema architecture + MCD</text>

  <text x="120" y="190" class="section">1) Modele conceptuel des donnees (MCD)</text>

  <!-- USERS table -->
  <rect class="table" x="120" y="230" width="1560" height="220"/>
  <line class="line" x1="120" y1="285" x2="1680" y2="285"/>
  <text x="900" y="267" text-anchor="middle" class="box-title">USERS</text>
  <text x="170" y="330" class="text">id (PK, bigint)</text>
  <text x="170" y="370" class="text">email (unique, string)</text>
  <text x="170" y="410" class="text">password_hash (string)</text>
  <text x="170" y="450" class="text">created_at (datetime)</text>
  <text x="980" y="330" class="small">Identifiant utilisateur</text>
  <text x="980" y="370" class="small">Adresse e-mail (unique)</text>
  <text x="980" y="410" class="small">Mot de passe hash BCrypt</text>
  <text x="980" y="450" class="small">Date de creation</text>

  <!-- FILE_METADATA table -->
  <rect class="table" x="120" y="610" width="1560" height="420"/>
  <line class="line" x1="120" y1="665" x2="1680" y2="665"/>
  <text x="900" y="647" text-anchor="middle" class="box-title">FILE_METADATA</text>
  <text x="170" y="710" class="text">token (PK, string)</text>
  <text x="170" y="750" class="text">filename (string)</text>
  <text x="170" y="790" class="text">size (bigint)</text>
  <text x="170" y="830" class="text">expires_at (datetime)</text>
  <text x="170" y="870" class="text">owner_id (FK -> users.id)</text>
  <text x="170" y="910" class="text">password (string, nullable)</text>
  <text x="170" y="950" class="text">created_at (datetime)</text>
  <text x="980" y="710" class="small">Jeton public de partage</text>
  <text x="980" y="750" class="small">Nom original du fichier</text>
  <text x="980" y="790" class="small">Taille en octets</text>
  <text x="980" y="830" class="small">Date d'expiration</text>
  <text x="980" y="870" class="small">Proprietaire du fichier</text>
  <text x="980" y="910" class="small">Mot de passe de fichier (hash)</text>
  <text x="980" y="950" class="small">Date de creation</text>

  <!-- FILE_TAGS table -->
  <rect class="table" x="420" y="1180" width="960" height="170"/>
  <line class="line" x1="420" y1="1235" x2="1380" y2="1235"/>
  <text x="900" y="1217" text-anchor="middle" class="box-title">FILE_TAGS</text>
  <text x="470" y="1285" class="text">file_token (FK -> file_metadata.token)</text>
  <text x="470" y="1325" class="text">tag (string)</text>
  <text x="1090" y="1285" class="small">Lien fichier/tag</text>
  <text x="1090" y="1325" class="small">Libelle tag</text>

  <!-- Relations MCD -->
  <line class="arrow" x1="900" y1="450" x2="900" y2="610"/>
  <text x="930" y="540" class="small">1 utilisateur possede 0..n fichiers</text>

  <line class="arrow" x1="900" y1="1030" x2="900" y2="1180"/>
  <text x="930" y="1110" class="small">1 fichier contient 0..n tags</text>

  <text x="120" y="1435" class="section">2) Architecture logicielle</text>

  <!-- Architecture nodes -->
  <rect class="chip" x="120" y="1500" width="380" height="120"/>
  <text x="310" y="1572" text-anchor="middle" class="box-title">Utilisateur (Navigateur)</text>

  <rect class="service" x="610" y="1465" width="560" height="190"/>
  <text x="890" y="1530" text-anchor="middle" class="box-title">Frontend Angular</text>
  <text x="890" y="1570" text-anchor="middle" class="text">- Authentification</text>
  <text x="890" y="1605" text-anchor="middle" class="text">- Upload / Download / Historique</text>

  <rect class="service" x="1270" y="1465" width="400" height="250"/>
  <text x="1470" y="1530" text-anchor="middle" class="box-title">Backend Spring Boot</text>
  <text x="1470" y="1570" text-anchor="middle" class="text">- API REST</text>
  <text x="1470" y="1605" text-anchor="middle" class="text">- Validation metier</text>
  <text x="1470" y="1640" text-anchor="middle" class="text">- JWT + nettoyage expiration</text>
  <text x="1470" y="1675" text-anchor="middle" class="text">- Actuator metrics</text>

  <ellipse class="chip" cx="1470" cy="1830" rx="200" ry="60"/>
  <text x="1470" y="1840" text-anchor="middle" class="box-title">Spring Security + JWT</text>

  <ellipse class="db" cx="1220" cy="1980" rx="180" ry="60"/>
  <text x="1220" y="1990" text-anchor="middle" class="box-title">PostgreSQL</text>

  <ellipse class="chip" cx="1620" cy="1980" rx="170" ry="60"/>
  <text x="1620" y="1970" text-anchor="middle" class="box-title">Stockage fichiers</text>
  <text x="1620" y="2000" text-anchor="middle" class="text">uploads/ (local FS)</text>

  <!-- Architecture arrows -->
  <line class="arrow" x1="500" y1="1560" x2="610" y2="1560"/>
  <text x="550" y="1545" class="small">HTTPS</text>

  <line class="arrow" x1="1170" y1="1560" x2="1270" y2="1560"/>
  <text x="1185" y="1545" class="small">REST JSON + JWT</text>

  <line class="arrow" x1="1470" y1="1715" x2="1470" y2="1770"/>
  <line class="arrow" x1="1370" y1="1715" x2="1230" y2="1920"/>
  <line class="arrow" x1="1570" y1="1715" x2="1615" y2="1920"/>

  <text x="120" y="2130" class="section">3) Legende et points de conformite</text>
  <text x="120" y="2180" class="text">- La cle primaire de fichier est token (et non un id numerique).</text>
  <text x="120" y="2215" class="text">- Les tags sont modelises en collection file_tags, pas en table TAG autonome.</text>
  <text x="120" y="2250" class="text">- Le nettoyage des fichiers expires est realise a l'acces (pas de scheduler planifie dedie).</text>
  <text x="120" y="2285" class="text">- L'API est securisee par JWT, avec endpoints publics limites (auth, info/download fichiers).</text>

  </g>
</svg>
