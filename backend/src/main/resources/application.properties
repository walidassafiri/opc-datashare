server.port=8080

# Datasource - use environment variables in Docker/Compose
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:opcdb}
spring.datasource.username=${DB_USER:opc}
spring.datasource.password=${DB_PASSWORD:secret}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT configuration
jwt.secret=replace_this_with_a_long_random_secret_of_at_least_32_chars
jwt.expiration-ms=3600000

# Metrics and observability
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=opc-datashare-backend
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.95,0.99

# Upload limits
spring.servlet.multipart.max-file-size=1GB
spring.servlet.multipart.max-request-size=1GB
