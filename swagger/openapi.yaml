openapi: 3.0.3
info:
  title: DataShare API
  description: API REST de partage de fichiers (authentification JWT, upload, download, historique).
  version: 1.1.0

servers:
  - url: /api

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          minLength: 8
          example: password123

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          example: password123

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        tokenType:
          type: string
          example: Bearer

    ApiError:
      type: object
      properties:
        status:
          type: integer
        message:
          type: string

    UserMeResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
          format: email

    FileMetadataResponse:
      type: object
      properties:
        token:
          type: string
        filename:
          type: string
        size:
          type: integer
          format: int64
        expiresAt:
          type: string
          format: date-time
        tags:
          type: array
          items:
            type: string
        ownerId:
          type: integer
          format: int64
          nullable: true
        password:
          type: string
          nullable: true
          description: Peut valoir "PROTECTED" sur l'endpoint info.
        createdAt:
          type: string
          format: date-time

paths:
  /auth/register:
    post:
      summary: Création de compte utilisateur
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Compte créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Données invalides
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /auth/login:
    post:
      summary: Connexion utilisateur
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Connexion réussie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Identifiants invalides
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /auth/logout:
    post:
      summary: Déconnexion (blacklist du token JWT courant)
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Déconnecté
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Logged out

  /me:
    get:
      summary: Informations de l'utilisateur authentifié
      tags: [User]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Données de l'utilisateur courant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserMeResponse'
        '401':
          description: Non authentifié

  /files/upload:
    post:
      summary: Upload d'un fichier (authentifié)
      tags: [Files]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                expirationDays:
                  type: integer
                  minimum: 1
                  maximum: 7
                password:
                  type: string
                  minLength: 6
                tags:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Fichier uploadé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileMetadataResponse'
        '400':
          description: Requête invalide (taille, extension, paramètres)
        '401':
          description: Non authentifié
        '500':
          description: Échec interne upload

  /files/history:
    get:
      summary: Historique des fichiers de l'utilisateur authentifié
      tags: [Files]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Liste des fichiers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FileMetadataResponse'
        '401':
          description: Non authentifié

  /files/{token}:
    delete:
      summary: Suppression d'un fichier (propriétaire seulement)
      tags: [Files]
      security:
        - bearerAuth: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Fichier supprimé
        '401':
          description: Non authentifié
        '403':
          description: Non autorisé ou fichier introuvable

  /files/info/{token}:
    get:
      summary: Métadonnées publiques d'un fichier
      tags: [Files]
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Métadonnées du fichier
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileMetadataResponse'
        '404':
          description: Fichier introuvable ou expiré

  /files/download/{token}:
    get:
      summary: Télécharger un fichier
      tags: [Files]
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
        - name: password
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Flux binaire du fichier
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '403':
          description: Mot de passe invalide, fichier expiré ou introuvable
