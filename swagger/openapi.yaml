openapi: 3.0.3
info:
  title: DataShare API
  description: API REST permettant le partage de fichiers via des liens temporaires
  version: 1.0.0

servers:
  - url: /api

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      properties:
        token:
          type: string

    FileMetadata:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        size:
          type: integer
        uploadedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        status:
          type: string
          example: VALID

    DownloadInfo:
      type: object
      properties:
        name:
          type: string
        size:
          type: integer
        expiresAt:
          type: string
          format: date-time
        passwordProtected:
          type: boolean

    PasswordRequest:
      type: object
      properties:
        password:
          type: string

paths:

  /auth/register:
    post:
      summary: Création de compte utilisateur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Compte créé
        '400':
          description: Données invalides

  /auth/login:
    post:
      summary: Connexion utilisateur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Connexion réussie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Identifiants invalides

  /auth/register:
    post:
      summary: Création de compte utilisateur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Compte créé
        '400':
          description: Données invalides

  /auth/login:
    post:
      summary: Connexion utilisateur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Connexion réussie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Identifiants invalides

  /auth/logout:
    post:
      summary: Déconnexion (mise en liste noire du token)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Déconnecté
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /files/history:
    get:
      summary: Historique des fichiers de l'utilisateur authentifié
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Liste des fichiers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FileMetadata'
        '401':
          description: Non authentifié

  /files/upload:
    post:
      summary: Upload de fichier (authentifié)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                expirationDays:
                  type: integer
                  minimum: 1
                  maximum: 7
                password:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Fichier uploadé
        '400':
          description: Requête invalide (taille, extension, etc.)
        '401':
          description: Non authentifié

  /files/{token}:
    delete:
      summary: Suppression d’un fichier (propriétaire seulement)
      security:
        - bearerAuth: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Fichier supprimé
        '403':
          description: Accès interdit ou fichier introuvable

  /files/info/{token}:
    get:
      summary: Métadonnées du fichier (informations de téléchargement)
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Métadonnées du fichier
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadInfo'
        '404':
          description: Fichier introuvable

  /files/download/{token}:
    get:
      summary: Télécharger un fichier (paramètre password en query)
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
        - name: password
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Contenu du fichier
        '403':
          description: Mot de passe invalide ou accès interdit
        '404':
          description: Fichier introuvable

